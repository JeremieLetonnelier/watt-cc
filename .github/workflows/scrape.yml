name: Import FFC Results

on:
  schedule:
    - cron: "0 8 * * 1" # Tous les lundis à 08:00 UTC
  workflow_dispatch:
    inputs:
      pdf_url:
        description: "URL du PDF à importer (optionnel)"
        required: false
        default: ""
      race_name:
        description: "Nom de la course (si PDF)"
        required: false
        default: "Course FFC"
      race_date:
        description: "Date de la course YYYY-MM-DD (si PDF)"
        required: false
        default: ""

jobs:
  import-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Import FFC web results
        run: python3 scripts/main.py --source auto

      - name: Import PDF results (si URL fournie)
        if: ${{ github.event.inputs.pdf_url != '' }}
        run: |
          python3 scripts/main.py \
            --source pdf \
            --url "${{ github.event.inputs.pdf_url }}" \
            --race-name "${{ github.event.inputs.race_name }}" \
            --race-date "${{ github.event.inputs.race_date || steps.date.outputs.date }}"

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add scripts/data/ffcResults.json scripts/data/ffcRiders.json
          git commit -m "chore: update FFC race results [skip ci]" || exit 0
          git push

