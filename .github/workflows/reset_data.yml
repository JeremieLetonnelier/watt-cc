name: Reset FFC Results

on:
  workflow_dispatch:

jobs:
  reset-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Reset FFC data
        run: python3 scripts/main.py --source auto --reset

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add scripts/data/ffcResults.json scripts/data/ffcRiders.json
          git commit -m "chore: reset FFC race results [skip ci]" || exit 0
          git push
